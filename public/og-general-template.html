
<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #1e3a5f 0%, #397397 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
    }
    .logo {
      width: 120px;
      height: 120px;
      background: white;
      border-radius: 20px;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .logo img {
      width: 80%;
      height: 80%;
      object-fit: contain;
    }
    h1 {
      font-size: 64px;
      font-weight: bold;
      margin: 0 0 20px 0;
      text-align: center;
      max-width: 900px;
      line-height: 1.2;
    }
    p {
      font-size: 32px;
      margin: 0;
      opacity: 0.9;
      text-align: center;
      max-width: 800px;
    }
    .badge {
      position: absolute;
      bottom: 40px;
      right: 40px;
      background: rgba(255,255,255,0.15);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 20px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="medgen.png" alt="Med-Gen Insurance" />
  </div>
  <h1>General Insurance</h1>
  <p>Motor, Property & Business Protection</p>
  <div class="badge">Med-Gen Insurance Agency</div>
</body>
</html>
